<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라이언's playground</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<style>
  :root {
    --bg: #0d0f12;
    --bg-soft: #15181d;
    --border: #23272e;
    --text: #e7e9ec;
    --muted: #8b93a1;
    --accent: #7ef9c0;
    --accent2: #b892ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(126,249,192,0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(184,146,255,0.10), transparent 45%),
      var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    display: flex;
    justify-content: center;
    padding: 64px 20px;
  }
  .wrap {
    width: 100%;
    max-width: 720px;
  }
  .tag {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--accent);
    border: 1px solid rgba(126,249,192,0.35);
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 18px;
  }
  h1 {
    font-size: 34px;
    margin: 0 0 8px;
    line-height: 1.25;
  }
  h1 .who {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p.lead {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    margin: 0 0 40px;
  }
  p.lead code {
    color: var(--text);
    background: var(--bg-soft);
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .panel {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px 26px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  }
  .panel-head {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .dots { display: flex; gap: 6px; margin-right: 6px; }
  .dots span {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block;
    background: #3a3f47;
  }
  .dots span:nth-child(1) { background: #ff5f57; }
  .dots span:nth-child(2) { background: #febc2e; }
  .dots span:nth-child(3) { background: #28c840; }

  ul.tree {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 15px;
    line-height: 2;
  }
  ul.tree .branch { color: var(--muted); }
  ul.tree a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px dashed transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  ul.tree a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  ul.tree .icon { margin-right: 4px; }
  ul.tree .hint {
    color: var(--muted);
    font-size: 12px;
    margin-left: 10px;
  }

  footer {
    margin-top: 32px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  footer a { color: var(--accent2); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="wrap">
    <span class="tag">⚡ side project HQ</span>
    <h1><span class="who">라이언</span>의 playground</h1>
    <p class="lead">
      진지함은 잠깐 내려두고 여기서 이것저것 실험하는 중.<br>
      <code>playground</code> repo에 쌓인 결과물들, 아래에서 바로 열어볼 수 있음.
    </p>

    <div class="panel">
      <div class="panel-head">
        <span class="dots"><span></span><span></span><span></span></span>
        playground/
      </div>
      <ul class="tree">
        <li><span class="branch">├──</span> <span class="icon">📄</span><a href="./README.md">README.md</a><span class="hint">저장소 소개</span></li>
        <li><span class="branch">└──</span> <span class="icon">🧮</span><a href="./ip-subnet-calculator.html">ip-subnet-calculator.html</a><span class="hint">IP 서브넷 계산기</span></li>
      </ul>
    </div>

    <footer>
      made for fun · <a href="https://github.com/" target="_blank" rel="noopener">github.com</a>
    </footer>
  </div>
</body>
</html>
