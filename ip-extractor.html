<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>IP 추출기</title>
<style>
  :root {
    color-scheme: light dark;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", sans-serif;
    margin: 0;
    padding: 24px;
    background: #f4f5f7;
    color: #1c1c1e;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 16px;
  }
  .container {
    display: flex;
    gap: 20px;
    height: 65vh;
    min-height: 420px;
  }
  .column {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #ffffff;
    border: 1px solid #d9dbe0;
    border-radius: 8px;
    padding: 16px;
  }
  .column h2 {
    font-size: 14px;
    margin: 0 0 10px;
    color: #444;
    font-weight: 600;
  }
  textarea {
    flex: 1;
    width: 100%;
    resize: none;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 13px;
    line-height: 1.5;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
  }
  textarea:focus {
    border-color: #4a7dfc;
  }
  textarea[readonly] {
    background: #fafafa;
  }
  button {
    margin-top: 12px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #4a7dfc;
    color: #fff;
  }
  button:hover { background: #3a6ae0; }
  button:disabled { background: #b7c2d9; cursor: not-allowed; }
  #status {
    margin-top: 14px;
    font-size: 13px;
    color: #555;
    white-space: pre-wrap;
    min-height: 18px;
  }
  #copyBtn.copied { background: #2ecc71; }

  @media (prefers-color-scheme: dark) {
    body { background: #1e1f22; color: #e6e6e6; }
    .column { background: #2a2b2e; border-color: #3a3b3e; }
    .column h2 { color: #bbb; }
    textarea { background: #1e1f22; color: #e6e6e6; border-color: #444; }
    textarea[readonly] { background: #232427; }
    #status { color: #aaa; }
  }
</style>
</head>
<body>

<h1>IP 추출기</h1>

<div class="container">
  <div class="column">
    <h2>원본 데이터 입력 (줄바꿈으로 구분)</h2>
    <textarea id="input" placeholder="1.234.78.200_순수관제&#10;192.168.0.2_텍스트&#10;텍스트으으으"></textarea>
    <button id="extractBtn">IP 추출</button>
  </div>

  <div class="column">
    <h2>추출된 IP 목록</h2>
    <textarea id="output" readonly placeholder="추출 결과가 여기에 표시됩니다."></textarea>
    <button id="copyBtn">복사</button>
  </div>
</div>

<div id="status"></div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');
const statusEl = document.getElementById('status');
const extractBtn = document.getElementById('extractBtn');
const copyBtn = document.getElementById('copyBtn');

// 한 줄에서 유효한 IPv4 형식(옥텟 4개, 각 0~255)의 첫 토큰만 추출
function extractIp(line) {
  const candidates = line.match(/[0-9.]+/g);
  if (!candidates) return '';

  for (const token of candidates) {
    const parts = token.split('.');
    if (parts.length !== 4) continue;
    if (parts.some(p => !/^\d{1,3}$/.test(p) || Number(p) > 255)) continue;
    return token;
  }
  return '';
}

// 각 줄에서 유효한 IP 형식만 남기고 나머지는 공백 처리 (행 번호는 그대로 유지)
extractBtn.addEventListener('click', () => {
  const lines = inputEl.value.split(/\r\n|\r|\n/);
  const resultLines = lines.map(extractIp);

  outputEl.value = resultLines.join('\n');

  const extractedCount = resultLines.filter(l => l.trim().length > 0).length;
  statusEl.textContent = `총 ${lines.length}줄 중 ${extractedCount}개 줄에서 IP를 추출했습니다.`;
});

copyBtn.addEventListener('click', async () => {
  if (!outputEl.value) return;

  try {
    await navigator.clipboard.writeText(outputEl.value);
  } catch (err) {
    outputEl.removeAttribute('readonly');
    outputEl.select();
    document.execCommand('copy');
    outputEl.setAttribute('readonly', 'true');
  }

  copyBtn.textContent = '복사됨!';
  copyBtn.classList.add('copied');
  setTimeout(() => {
    copyBtn.textContent = '복사';
    copyBtn.classList.remove('copied');
  }, 1200);
});
</script>

</body>
</html>
